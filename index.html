 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
</head>

<body style="
    font-family: Arial, sans-serif;
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(to right, #d9eafc, #f9f1ff);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
">

    <div style="max-width: 800px; padding: 40px;">

        <!-- Header -->
        <h1 style="
            color: #333333;
            font-size: 42px;
            margin-bottom: 20px;
        ">
            Jhaird Kent Urubio
        </h1>

        <!-- Profile Picture -->
        <div>
            <img src="picture.jpeg" alt="Profile Picture" style="
                width: 200px;
                height: 200px;
                border-radius: 50%;
                object-fit: cover;
                border: 4px solid white;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            ">
        </div>

        <!-- Portfolio Description -->
        <p style="
            max-width: 600px;
            margin: 40px auto;
            font-size: 18px;
            line-height: 1.6;
            color: #274151;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 10px;
        ">
            Hello! I am a passionate web developer who enjoys creating clean and
            user-friendly websites. I love learning new technologies and
            improving my design and coding skills.
        </p>

        <!-- Interests Title -->
        <h2 style="color: #1c2d37;">
            My Interests
        </h2>

        <!-- Interests List -->
        <ul style="
            list-style: none;
            padding: 20px 40px;
            font-size: 18px;
            color: #1c2d37;
            background-color: rgba(255, 255, 255, 0.7);
            display: inline-block;
            border-radius: 10px;
            margin-top: 10px;
        ">
            <li style="margin: 10px 0;">🎮 Playing Online Games</li>
            <li style="margin: 10px 0;">🏊 Swimming</li>
            <li style="margin: 10px 0;">📚 Reading Books</li>
            <li style="margin: 10px 0;">🥾 Hiking</li>
        </ul>

    </div>

</body>
</html>
